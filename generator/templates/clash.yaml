tcp-concurrent: true
keep-alive-interval: 60
keep-alive-idle: 120
disable-keep-alive: false

dns:
  enable: true
  ipv6: false
  prefer-h3: true
  enhanced-mode: fake-ip
  dns-hijack: []
  nameserver:
    - https://8.8.8.8/dns-query
    - https://1.1.1.1/dns-query
  default-nameserver:
    - https://8.8.8.8/dns-query
    - https://1.1.1.1/dns-query
  proxy-server-nameserver:
    - https://8.8.8.8/dns-query
    - https://1.1.1.1/dns-query

proxies:
  - name: 443-tcp
    type: vless
    server: {SERVER}
    port: 443
    uuid: {UUID}
    network: tcp
    tls: true
    udp: true
    reality-opts:
      public-key: {REALITY-PUBLIC-KEY}
      short-id: ""
    servername: www.github.com
    client-fingerprint: chrome
    flow: xtls-rprx-vision

  - name: mieru-udp
    type: mieru
    server: {SERVER}
    port-range: "10000-10255"
    transport: UDP
    multiplexing: MULTIPLEXING_LOW
    udp: true
    username: {USERNAME}
    password: {PASSWORD}

  - name: trust-http2
    type: trusttunnel
    server: {SERVER}
    port: 8443
    sni: {SERVER}
    udp: true
    skip-cert-verify: false
    quic: false
    health-check: true
    username: {USERNAME}
    password: {PASSWORD}

  - name: trust-http3
    type: trusttunnel
    server: {SERVER}
    port: 8443
    sni: {SERVER}
    udp: true
    skip-cert-verify: false
    quic: true
    health-check: true
    username: {USERNAME}
    password: {PASSWORD}

proxy-groups:
  - name: PROXY
    type: fallback
    proxies:
    - 443-tcp
    - proxy-trust
    - mieru-udp
    url: 'https://www.gstatic.com/generate_204'
    interval: 900
    lazy: false

  - name: proxy-trust
    type: fallback
    proxies:
    - trust-http2
    - trust-http3
    url: 'https://www.gstatic.com/generate_204'
    interval: 0
    lazy: false
    hidden: true

